model: efficientnet_b0
pretrained: true
num_epochs: 30
batch_size: 32
learning_rate: 3.0e-4
weight_decay: 1.0e-4
warmup_epochs: 5
seed: 42
augmentation:
  physics_synthetic: true
  target_min_samples: 500
loss:
  type: ce          # legacy experiment: class-weighted CE, reproduces the
                    # documented 78.8% as-reported number (not the new default)
wandb:
  project: solar-thermal-cv
  run_name: physics-augmented
